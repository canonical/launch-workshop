name: Automatic tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run ci-test

  os-tests:
    name: OS tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        workshop: [focal, jammy, noble]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install workshop
        uses: ./
        with:
          token: ${{ secrets.WORKSHOP_TOKEN }}

      - name: Check base image
        run: |
          workshop launch "$WS"
          release="$(workshop exec "$WS" lsb_release --codename --short)"
          [ "$WS" = "$release" ]
        env:
          WS: ${{ matrix.workshop }}
